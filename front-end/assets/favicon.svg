<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="ChowNow">

  <defs>
    <pattern id="adire-fav" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.6" fill="#fff" opacity="0.2"/>
    </pattern>
    <clipPath id="fav-clip">
      <rect x="0" y="0" width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#C84B11"/>
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#adire-fav)"/>

  <!-- Bottom stripe -->
  <rect x="0" y="23" width="32" height="9" rx="0" fill="#8B3210" clip-path="url(#fav-clip)"/>
  <rect x="0" y="23" width="32" height="2" fill="#E87C3E" opacity="0.9"/>

  <!-- Steam -->
  <path d="M11 10 Q10 7 11 4" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M16 9  Q15 6 16 3" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M21 10 Q20 7 21 4" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Bowl -->
  <path d="M5 16 Q5 23 16 23 Q27 23 27 16 Q27 11 16 10 Q5 11 5 16Z" fill="#fff" opacity="0.95"/>

  <!-- Food surface -->
  <ellipse cx="16" cy="13.5" rx="9" ry="3.5" fill="#E87C3E" opacity="0.9"/>
  <circle cx="13.5" cy="13" r="1" fill="#C84B11" opacity="0.6"/>
  <circle cx="16"   cy="12.5" r="1" fill="#C84B11" opacity="0.6"/>
  <circle cx="18.5" cy="13" r="1" fill="#C84B11" opacity="0.6"/>
  <ellipse cx="16" cy="13.5" rx="9" ry="3.5" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>

  <!-- Bowl base -->
  <rect x="13" y="22" width="6" height="2" rx="1" fill="#fff" opacity="0.85"/>
  <rect x="10" y="24" width="12" height="2" rx="1" fill="#fff" opacity="0.65"/>

  <!-- C letter on bottom stripe (brand mark) -->
  <text x="16" y="30"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="7"
    font-weight="700"
    fill="#fff"
    opacity="0.8"
    letter-spacing="1">CN</text>

</svg>