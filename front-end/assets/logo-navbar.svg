<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44" role="img" aria-label="ChowNow">

  <defs>
    <pattern id="adire-nav" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.8" fill="#fff" opacity="0.2"/>
      <line x1="0" y1="0" x2="8" y2="8" stroke="#fff" stroke-width="0.3" opacity="0.1"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#fff" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    <clipPath id="icon-clip">
      <rect x="0" y="0" width="44" height="44" rx="10"/>
    </clipPath>
  </defs>

  <!-- Icon box -->
  <rect x="0" y="0" width="44" height="44" rx="10" fill="#C84B11"/>
  <rect x="0" y="0" width="44" height="44" rx="10" fill="url(#adire-nav)"/>

  <!-- Icon border -->
  <rect x="2" y="2" width="40" height="40" rx="8" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.25"/>

  <!-- Bottom stripe -->
  <rect x="0" y="32" width="44" height="12" rx="0" fill="#8B3210" clip-path="url(#icon-clip)"/>
  <rect x="0" y="32" width="44" height="2" fill="#E87C3E" opacity="0.8"/>

  <!-- Steam wisps (small) -->
  <path d="M16 14 Q14 10 16 6"  fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M22 12 Q20 8 22 4"   fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M28 14 Q26 10 28 6"  fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Bowl -->
  <path d="M8 22 Q8 32 22 32 Q36 32 36 22 Q36 16 22 15 Q8 16 8 22Z" fill="#fff" opacity="0.95"/>

  <!-- Food surface -->
  <ellipse cx="22" cy="19" rx="11" ry="4.5" fill="#E87C3E" opacity="0.9"/>
  <circle cx="19" cy="18.5" r="1" fill="#C84B11" opacity="0.6"/>
  <circle cx="22" cy="18"   r="1" fill="#C84B11" opacity="0.6"/>
  <circle cx="25" cy="18.5" r="1" fill="#C84B11" opacity="0.6"/>
  <ellipse cx="22" cy="19" rx="11" ry="4.5" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>

  <!-- Bowl base -->
  <rect x="18" y="31" width="8" height="2" rx="1" fill="#fff" opacity="0.85"/>
  <rect x="15" y="33" width="14" height="2" rx="1" fill="#fff" opacity="0.65"/>

  <!-- "ChowNow" wordmark text -->
  <text x="52" y="18"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-weight="700"
    fill="#C84B11"
    letter-spacing="-0.3">Chow</text>

  <text x="95" y="18"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-weight="700"
    fill="#8B3210"
    letter-spacing="-0.3">Now</text>

  <!-- Tagline under wordmark -->
  <text x="52" y="30"
    font-family="Georgia, serif"
    font-size="7.5"
    fill="#E87C3E"
    letter-spacing="1.8">NIGERIAN KITCHEN</text>

  <!-- Corner diamonds on icon -->
  <polygon points="4,3 7,6 4,9 1,6"   fill="#fff" opacity="0.2"/>
  <polygon points="40,3 43,6 40,9 37,6" fill="#fff" opacity="0.2"/>

</svg>